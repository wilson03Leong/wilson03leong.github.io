<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Push Demo</title>

  <!-- ✅ PWA 必须：引用 manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- ✅ iOS Safari 专用 meta -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="WebPush Demo">
  <link class="apple-touch-icon" href="/icon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      color: #e2e8f0;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      /* Adds a gaming controller/abstract cyber pattern background */
      background-image: url('https://images.unsplash.com/photo-1538481199705-c710c4e965fc?q=80&w=1920&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    .neon-border {
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
      border: 1px solid rgba(168, 85, 247, 0.3);
    }
    .neon-btn {
      background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
    }
    .neon-btn:hover {
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.8);
      transform: translateY(-1px);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

  <header class="w-full bg-slate-900/80 backdrop-blur-md border-b border-slate-800 p-4 flex justify-between items-center px-6">
    <div class="text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-indigo-400">
      NEXUS<span class="text-white">GAMES</span>
    </div>
    <div class="flex gap-4 text-xs font-semibold tracking-widest text-slate-400">
      <span class="hover:text-purple-400 cursor-pointer">ARCADE</span>
      <span class="hover:text-purple-400 cursor-pointer text-purple-400">QUESTS</span>
      <span class="hover:text-purple-400 cursor-pointer">STORE</span>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center p-4">
    <div class="bg-slate-900/90 neon-border p-8 rounded-2xl max-w-sm w-full text-center relative overflow-hidden">
      
      <div class="absolute -top-10 -left-10 w-32 h-32 bg-purple-600/10 rounded-full blur-2xl"></div>
      
      <div class="mb-4">
        <span class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/30 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">
          Server Event
        </span>
      </div>

      <h1 class="text-3xl font-extrabold tracking-tight text-white mb-2 uppercase">
        Unlock Beta Access (ROOT)
      </h1>
      <p class="text-slate-400 text-sm mb-6 leading-relaxed">
        Enable system alerts to claim your <span class="text-purple-400 font-semibold">Premium Play Tokens</span> and get instant notifications when rare daily drop rooms open.
      </p>

      <button id="subscribeBtn" class="neon-btn w-full text-white font-bold py-3.5 px-6 rounded-xl transition-all duration-200 uppercase tracking-wider text-sm">
        订阅推送
      </button>

      <div class="mt-6 pt-4 border-t border-slate-800/60">
        <p id="status" class="text-[11px] tracking-widest text-slate-500 font-bold">
          状态：未订阅
        </p>
      </div>

    </div>
  </main>

  <footer class="w-full text-center pb-6 text-xs text-slate-600 tracking-wide">
    &copy; 2026 NexusGames Global Portal. All Rights Reserved.
  </footer>

  <!-- ✅ 引入EngageLab Web SDK -->
  <script src="./webSdk.produce.min.3.3.5.js"></script>

  <script src="app.js"></script>

  <script src="https://www.gptbots.ai/widget/wehwsuugh96rpawdvjaz3gs/chat.js"></script>
</body>
</html>
